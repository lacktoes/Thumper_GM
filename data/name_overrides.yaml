#                         Tony/Anthony, Cam/Cameron, Will/William, etc.
#
# Add entries here when a player still shows as FA despite being rostered.
# Format: "NHL API Name": "Yahoo Fantasy Name"

# Genuine spelling differences
"Matthew Barzal":    "Mathew Barzal"       # NHL: two t's, Yahoo: one t
"Evgeny Dadonov":    "Evgenii Dadonov"     # NHL: Evgeny, Yahoo: Evgenii
"Jonathon Merrill":  "Jon Merrill"         # Covered by nickname but added for safety

